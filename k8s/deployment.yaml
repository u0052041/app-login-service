apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-login-service
  namespace: default
  labels:
    app: app-login-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-login-service
  template:
    metadata:
      labels:
        app: app-login-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: app-login-service
          # IMAGE_FULL 由 Jenkinsfile envsubst 注入
          image: ${IMAGE_FULL}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          # 敏感設定從 Secret 載入（SECRET_KEY, DATABASE_URL, ENVIRONMENT）
          # 建立方式見 Jenkinsfile 頂部注解
          envFrom:
            - secretRef:
                name: app-login-service-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: app-login-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: app-login-service
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-login-service
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: app-login-service
