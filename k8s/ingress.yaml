apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-login-service
  namespace: default
  annotations:
    # ── ALB 基礎 ──
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: main       # 與其他服務共用同一個 ALB
    alb.ingress.kubernetes.io/group.order: "10"

    # ── HTTPS ──
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # WILDCARD_CERT_ARN 由 Jenkinsfile 從 SSM 讀取後 envsubst 注入
    alb.ingress.kubernetes.io/certificate-arn: ${WILDCARD_CERT_ARN}
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06

    # ── Health Check（對應 /health 端點）──
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200"

    # ── Tags ──
    alb.ingress.kubernetes.io/tags: Environment=prod,ManagedBy=alb-controller
spec:
  ingressClassName: alb
  rules:
    - host: auth.u0052041.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-login-service
                port:
                  number: 80
